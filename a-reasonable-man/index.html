<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="../favicon.png">
<meta charset="UTF-8">
<link rel="apple-touch-icon" sizes="300x300" href="../favicon.png">
<meta name="apple-mobile-web-app-status-bar-style" content="white">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<title>A Reasonable Man</title>
<style>
.video-container {
  position: relative; padding-bottom: 56.25%;
  height: 0; overflow: hidden;
  max-width: 1025px; margin: auto;
}
.video-container iframe,
.video-container object,
.video-container embed {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
}
.galeri {
  padding-top: 30px; gap: 30px;
  display: flex; max-width: 800px; margin: auto;
}
.galeri img {
  flex: 1 1 calc((100% - 60px) / 3);
  max-width: calc((100% - 60px) / 3);
  height: auto; display: block;
}
#lb {
  display: none; position: fixed; inset: 0;
  background: rgba(255,255,255,0.88);
  z-index: 9999; user-select: none;
  align-items: center; justify-content: center;
}
#lb.open { display: flex; }
#lb img {
  max-width: 90vw; max-height: 90vh;
  object-fit: contain; display: block;
}
.foot { text-align: center; margin-top: 30px; margin-bottom: 30px; }
p { padding-top: 30px; text-align: center; margin-left: auto; margin-right: auto; max-width: 800px; }
a { color: black; text-decoration-style: dashed; }
header { text-align: center; margin-top: 30px; }
img, video { max-width: 100%; height: auto; vertical-align: middle; }
h1 { text-align: center; font-family: "Outfit", sans-serif; font-weight: 400; }
.wrapper {
  text-align: center; margin-left: auto; margin-right: auto;
  padding-top: 30px; max-width: 1080px;
  font-family: "Outfit", sans-serif; font-weight: 400;
}
</style>
</head>
<header>
  <a href="https://studiomoi.co"><img src="../logo.png" alt="studio moi"></a>
</header>
<body>
  <div id="lb" onclick="this.classList.remove('open')">
    <img id="lb-img" src="" alt="">
  </div>
  <div class="wrapper">
    <h1>A Reasonable Man</h1>
    <br>
<img src="full.jpg" alt="Proje Resmi">
<br>
<p>A Reasonable Man is a film by Sydney Ribot.</p>
<p>"When a European financier leaves a party in Beijing with a secret, he comes up with a foolproof way to ensure it is not compromised."</p>
<br>
<img src="poster.jpg" alt="Proje Resmi">
<br>
<br>
<div class="video-container">
    <iframe src="https://player.vimeo.com/video/291071998" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
</div>
<br>
<div class="video-container">
    <iframe src="https://player.vimeo.com/video/291076099" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
</div>
<div class="galeri">
    <img src="g1.jpg" alt="Proje Galeri Resmi">
    <img src="g2.jpg" alt="Proje Galeri Resmi">
    <img src="g3.jpg" alt="Proje Galeri Resmi">
</div>
<br>
  </div>
  <div class="foot">
    <a href="https://studiomoi.co" style="text-decoration: none;">studio moi</a>
  </div>
  <script>
  document.querySelectorAll('.galeri img').forEach(function(img) {
    img.addEventListener('click', function() {
      document.getElementById('lb-img').src = this.src;
      document.getElementById('lb').classList.add('open');
    });
  });
  </script>
</body>
</html>
