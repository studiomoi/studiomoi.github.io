<script>
(function () {
  var GAP = 15;
  function cols() {
    return window.innerWidth >= 1024 ? 3 : window.innerWidth >= 768 ? 2 : 1;
  }
  function layout() {
    var grid = document.getElementById('masonry');
    var bricks = Array.from(grid.querySelectorAll('.brick'));
    var n = cols();
    var gridW = grid.offsetWidth;
    var colW = (gridW - GAP * (n - 1)) / n;
    var heights = new Array(n).fill(0);
    bricks.forEach(function (brick) {
      brick.style.width = colW + 'px';
      var shortest = heights.indexOf(Math.min.apply(null, heights));
      brick.style.left = (shortest * (colW + GAP)) + 'px';
      brick.style.top = heights[shortest] + 'px';
      heights[shortest] += brick.offsetHeight + GAP;
    });
    grid.style.height = Math.max.apply(null, heights) + 'px';
  }
  layout();
  window.addEventListener('resize', layout);
})();
</script>
