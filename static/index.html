<!DOCTYPE html>
<html lang="tr">
<head>
<link rel="icon" type="image/png" href="favicon.png">   
<meta charset="UTF-8">
<link rel="apple-touch-icon" sizes="300x300" href="favicon.png">
<meta name="apple-mobile-web-app-status-bar-style" content="white">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Studio Moi">
<meta property="og:description" content="Studio Moi is an Istanbul based creative studio specialized in art direction, branding, graphic design, motion design & 3D animation.">
<meta property="og:image" content="logo.png">
<meta property="og:url" content="https://studiomoi.co">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Studio Moi">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<title>studiomoi.co</title>

<style>
a {
    color: black;
    text-decoration-style: dashed;
}

footer {
  text-align: center;
  font-family: "Outfit", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  margin-top: 30px;
  margin-bottom: 30px;
}
header {
  text-align: center;
  margin-top: 30px;
}        

img, video {
   max-width: 100%;
   vertical-align: middle;
}

.intro {
  text-align: center;
  font-family: "Outfit", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
 }
.wrapper {
   margin-left: auto;
   margin-right: auto;
   padding-top: 1.5em;
   padding-right: 1.5em;
   padding-left: 1.5em;
   max-width: 1080px;
 }

/* Masonry grid */
.masonry {
  position: relative;
}

/* Masonry item */
.masonry .brick {
  position: absolute;
  overflow: hidden;
}

/* Masonry image effects */
.masonry .brick img {
  width: 100%;
  height: auto;
  display: block;
  transition: all .3s ease-in-out;
  backface-visibility: hidden;
}

.masonry .brick:hover img {
  transform: scale(1.1);
}
</style>          

</head>
<header>
  <a href="https://studiomoi.co"><img src="logo.png" alt="studio moi"></a>
</header>
<body>
<div class="wrapper">
<br>
<div class="intro">
<p>Studio Moi is an Istanbul based creative studio specialized in art direction, branding, graphic design, motion design & 3D animation.</p>
<p><a href="about.html">read more about us</a></p>
</div>
<br>
<br>
<div class="masonry">    
{% block proje_listesi_icerigi %}{% endblock %}
</div>
<br>
<br>
<footer>
  <a href="https://studiomoi.co" style="text-decoration: none;">studio moi</a>  
  </footer>
</div>

<script>
(function () {
  var GAP = 15;

  function layout() {
    var grid = document.querySelector('.masonry');
    if (!grid) return;
    var bricks = Array.from(grid.querySelectorAll('.brick'));
    if (!bricks.length) return;

    var gridWidth = grid.clientWidth;
    var cols = gridWidth >= 1024 ? 3 : gridWidth >= 768 ? 2 : 1;
    var colWidth = (gridWidth - GAP * (cols - 1)) / cols;
    var colHeights = new Array(cols).fill(0);

    bricks.forEach(function (brick) {
      var minCol = colHeights.indexOf(Math.min.apply(null, colHeights));
      var img = brick.querySelector('img');
      var w = parseInt(img.getAttribute('width'), 10);
      var h = parseInt(img.getAttribute('height'), 10);
      var brickHeight = (w && h) ? Math.round(colWidth * h / w) : colWidth;

      brick.style.width = colWidth + 'px';
      brick.style.left  = (minCol * (colWidth + GAP)) + 'px';
      brick.style.top   = colHeights[minCol] + 'px';

      colHeights[minCol] += brickHeight + GAP;
    });

    grid.style.height = Math.max.apply(null, colHeights) + 'px';
  }

  document.addEventListener('DOMContentLoaded', function () {
    layout();

    // Görsel yüklendikçe layout'u düzelt
    document.querySelectorAll('.masonry img').forEach(function (img) {
      if (!img.complete) {
        img.addEventListener('load', layout);
        img.addEventListener('error', layout);
      }
    });
  });

  // Pencere boyutu değişince yeniden hesapla
  var resizeTimer;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(layout, 100);
  });
})();
</script>

</body>
</html>
